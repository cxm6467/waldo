name: gh setup waldo

on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Target GitHub org (leave empty for personal account)'
        required: false
        default: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable GitHub Pages
        run: |
          # Enable Pages via API
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          # Update Pages settings (requires admin token)
          curl -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.switcheroo-preview+json" \
            https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/pages \
            -d '{
              "source": {
                "branch": "main",
                "path": "/"
              }
            }' || echo "Pages may already be enabled"

      - name: Report status
        run: |
          echo "✓ Setup complete"
          echo ""
          echo "UI will be available at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ui/"
