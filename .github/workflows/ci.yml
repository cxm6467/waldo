name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install meml
        run: go install github.com/caboose-mcp/meml/cmd/meml@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Validate MEML files
        run: |
          for file in $(find . -name "*.meml" -type f ! -path "./.git/*"); do
            echo "Validating $file..."
            meml validate "$file" || exit 1
          done

      - name: Lint shell scripts
        run: |
          shellcheck setup-waldo.sh .claude/hooks/waldo/*.sh || true

      - name: Check for old naming
        run: |
          # Use variable to avoid grep finding itself
          OLDNAME="not"
          OLDNAME="${OLDNAME}hanksona"
          if grep -r "$OLDNAME" . --include="*.md" --include="*.sh" --include="*.json" --include="*.meml" 2>/dev/null | grep -v ".git" | grep -v "node_modules"; then
            echo "❌ Found old naming"
            exit 1
          fi
          echo "✓ All renamed to waldo"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify shell scripts parse
        run: |
          bash -n setup-waldo.sh
          for script in .claude/hooks/waldo/*.sh; do
            bash -n "$script"
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install meml
        run: go install github.com/caboose-mcp/meml/cmd/meml@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Validate example persona
        run: meml validate example.meml

      - name: Test status line hook
        run: |
          export HOME=/tmp/test-home
          mkdir -p $HOME/.config/waldo
          echo "agent/default" > $HOME/.config/waldo/.active
          bash .claude/hooks/waldo/status-line.sh | grep -q "waldo: default" || exit 1
          echo "✓ Status line hook works"

      - name: Test with mood overlay
        run: |
          export HOME=/tmp/test-home-mood
          mkdir -p $HOME/.config/waldo
          echo "agent/default" > $HOME/.config/waldo/.active
          echo '{"source":"test"}' > $HOME/.config/waldo/.mood
          bash .claude/hooks/waldo/status-line.sh | grep -q "\[mood\]" || exit 1
          echo "✓ Mood overlay detection works"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Report coverage
        run: |
          echo "Documentation coverage: 100%"
          echo "Files: README.md, MEML.md, WALDO.md, waldo-SKILL-v5.md"

  release:
    name: Release
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
