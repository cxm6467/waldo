<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>waldo playground — Interactive Persona Sandbox</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/codemirror.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/theme/monokai.min.css">
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.2/mode/properties/properties.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      line-height: 1.6;
    }

    .playground {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .controls {
      background: #2a2a2a;
      padding: 20px;
      border-bottom: 1px solid #444;
      overflow-y: auto;
      max-height: 200px;
    }

    .control-section {
      margin-bottom: 20px;
    }

    .control-section h3 {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .slider-group {
      margin-bottom: 16px;
    }

    .slider-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 6px;
      color: #ccc;
    }

    .slider-value {
      font-family: monospace;
      background: #444;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
      color: #888;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #444;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #764ba2;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #764ba2;
    }

    .example-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .example-btn {
      padding: 6px 12px;
      background: #444;
      color: #ccc;
      border: 1px solid #666;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .example-btn:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    .editor-pane, .preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #444;
    }

    .preview-pane {
      border-right: none;
      border-left: 1px solid #444;
    }

    .pane-title {
      background: #2a2a2a;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      border-bottom: 1px solid #444;
      letter-spacing: 0.5px;
    }

    .editor-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .CodeMirror {
      height: 100% !important;
      background: #1e1e1e !important;
      color: #e0e0e0 !important;
      font-family: "Monaco", "Menlo", "Courier New", monospace !important;
    }

    .tabs {
      display: flex;
      background: #2a2a2a;
      border-bottom: 1px solid #444;
      gap: 0;
    }

    .tab {
      flex: 1;
      padding: 12px;
      background: #2a2a2a;
      color: #888;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tab:hover {
      color: #ccc;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
      background: #1e1e1e;
    }

    .tab-content {
      flex: 1;
      overflow: auto;
      padding: 16px;
      font-family: "Monaco", "Menlo", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .tab-content pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #888;
      background: #2a2a2a;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid #444;
      max-height: 100%;
      overflow: auto;
    }

    .actions {
      display: flex;
      gap: 8px;
      padding: 16px;
      background: #2a2a2a;
      border-top: 1px solid #444;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #764ba2;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #444;
      color: #ccc;
      border: 1px solid #666;
    }

    .btn-secondary:hover {
      background: #555;
      border-color: #777;
    }

    .message {
      padding: 12px 16px;
      background: #2a2a2a;
      border-top: 1px solid #444;
      font-size: 12px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #1e3a1f;
      color: #4ade80;
      border-top-color: #4ade80;
    }

    .message.error {
      background: #3a1e1f;
      color: #f87171;
      border-top-color: #f87171;
    }

    .message.info {
      background: #1e2a3a;
      color: #60a5fa;
      border-top-color: #60a5fa;
    }

    .error-hint {
      color: #f87171;
      font-size: 11px;
      margin-top: 4px;
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr;
      }

      .editor-pane {
        border-right: none;
        border-bottom: 1px solid #444;
      }

      .preview-pane {
        border-left: none;
      }

      .controls {
        max-height: 150px;
      }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 18px;
      }

      .controls {
        max-height: 120px;
      }

      .example-buttons {
        flex-direction: column;
      }

      .example-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="playground">
    <header>
      <h1>🎭 waldo playground</h1>
      <p>Interactive sandbox for MEML persona config. Experiment with tone, export to ChatGPT, no installation required.</p>
    </header>

    <div class="controls">
      <div class="control-section">
        <h3>Tone Sliders</h3>
        <div class="slider-group">
          <label>
            Formality
            <span class="slider-value" id="formality-value">0.50</span>
          </label>
          <input type="range" id="formality" min="0" max="100" value="50" step="1">
        </div>
        <div class="slider-group">
          <label>
            Directness
            <span class="slider-value" id="directness-value">0.50</span>
          </label>
          <input type="range" id="directness" min="0" max="100" value="50" step="1">
        </div>
        <div class="slider-group">
          <label>
            Humor
            <span class="slider-value" id="humor-value">0.50</span>
          </label>
          <input type="range" id="humor" min="0" max="100" value="50" step="1">
        </div>
        <div class="slider-group">
          <label>
            Hedging
            <span class="slider-value" id="hedging-value">0.50</span>
          </label>
          <input type="range" id="hedging" min="0" max="100" value="50" step="1">
        </div>
        <div class="slider-group">
          <label>
            Warmth
            <span class="slider-value" id="warmth-value">0.50</span>
          </label>
          <input type="range" id="warmth" min="0" max="100" value="50" step="1">
        </div>
      </div>

      <div class="control-section">
        <h3>Examples</h3>
        <div class="example-buttons">
          <button class="example-btn" data-example="default">Default</button>
          <button class="example-btn" data-example="direct">Direct</button>
          <button class="example-btn" data-example="formal">Formal</button>
          <button class="example-btn" data-example="warm">Warm</button>
          <button class="example-btn" data-example="technical">Technical</button>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="editor-pane">
        <div class="pane-title">MEML Editor</div>
        <div class="editor-container">
          <textarea id="meml-editor"># default persona

[🪪 meta]
name        = "default"
version     = "0.1.0"

[🎭 tone]
formality   = 0.5
directness  = 0.5
humor       = 0.5
hedging     = 0.5
warmth      = 0.5</textarea>
        </div>
      </div>

      <div class="preview-pane">
        <div class="tabs">
          <button class="tab active" data-tab="json">JSON</button>
          <button class="tab" data-tab="prompt">ChatGPT Prompt</button>
          <button class="tab" data-tab="validation">Validation</button>
        </button>
        </div>

        <div class="tab-content active" id="json-content">
          <pre id="json-output">{}</pre>
        </div>

        <div class="tab-content" id="prompt-content">
          <pre id="prompt-output"></pre>
        </div>

        <div class="tab-content" id="validation-content">
          <pre id="validation-output">✓ Valid MEML config</pre>
        </div>

        <div class="actions">
          <button class="btn" id="copy-json">Copy JSON</button>
          <button class="btn" id="copy-prompt">Copy ChatGPT Prompt</button>
          <button class="btn btn-secondary" id="download-meml">Download MEML</button>
          <button class="btn btn-secondary" id="copy-gemini">Copy Gemini Prompt</button>
        </div>
      </div>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script src="playground.js"></script>
</body>
</html>
